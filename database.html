<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车型库 · 超哥超车</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* ===== database.html 页面专属样式 ===== */

    /* 页面标题区 */
    .page-hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--rule);
      text-align: center;
      padding: 4.5rem 1.5rem 3rem;
      background: radial-gradient(ellipse at 50% 0%, var(--bg2) 0%, var(--bg) 60%, var(--bg) 100%);
    }
    .page-hero::before {
      content: '';
      position: absolute;
      top: -40%; left: 50%;
      transform: translateX(-50%);
      width: 90%; height: 140%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 16%, transparent) 0%, color-mix(in srgb, var(--accent) 5%, transparent) 35%, transparent 65%);
      filter: blur(20px);
      pointer-events: none;
    }
    .page-hero > * { position: relative; z-index: 1; }
    .page-hero h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      margin-bottom: 0.8rem;
      letter-spacing: -0.02em;
    }
    .page-hero h1 .accent { color: var(--accent); }
    .page-hero .sub {
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== 筛选器 ===== */
    .filter-bar {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 1.3rem 1.4rem;
      margin-bottom: 1.6rem;
    }
    .filter-group { margin-bottom: 1.1rem; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .filter-label .hint { color: var(--accent2); font-size: 0.7rem; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .chip {
      padding: 0.45rem 0.95rem;
      background: var(--bg3);
      border: 1px solid var(--rule);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .chip:hover { color: var(--ink); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
    .chip.active {
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip.budget.active {
      background: color-mix(in srgb, var(--accent2) 16%, transparent);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .filter-foot {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .result-count {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .result-count strong { color: var(--accent); font-weight: 700; font-size: 1.05rem; }
    .reset-btn {
      padding: 0.4rem 0.9rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
    }
    .reset-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ===== 车型网格 ===== */
    .car-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
    }
    @media(max-width:960px){ .car-grid{ grid-template-columns:1fr 1fr; } }
    @media(max-width:600px){ .car-grid{ grid-template-columns:1fr; } }

    .car-card {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.3rem 1.3rem 1.1rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), border-color 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .car-card:hover {
      transform: translateY(-3px);
      border-top-color: var(--accent2);
      box-shadow: var(--shadow);
    }
    .car-card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 6%, transparent), transparent);
      transition: left 0.6s ease;
    }
    .car-card:hover::after { left: 100%; }

    .car-head { display: flex; align-items: flex-start; gap: 0.7rem; margin-bottom: 0.5rem; }
    .car-emoji { font-size: 1.5rem; line-height: 1.2; flex-shrink: 0; }
    .car-name { font-size: 1.05rem; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; line-height: 1.3; }
    .car-type {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: var(--muted);
      background: var(--bg3);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .car-price {
      font-family: var(--font-mono);
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.7rem;
    }
    .car-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.8rem; }
    .car-tag {
      font-size: 0.7rem;
      padding: 0.12rem 0.5rem;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--accent2) 35%, transparent);
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 8%, transparent);
    }
    .car-tag.t-newenergy { color: var(--accent3); border-color: color-mix(in srgb, var(--accent3) 40%, transparent); background: color-mix(in srgb, var(--accent3) 8%, transparent); }

    .car-comment {
      font-size: 0.88rem;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 0.8rem;
      font-style: italic;
      position: relative;
      padding-left: 0.7rem;
      border-left: 2px solid color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .car-toggle {
      display: flex; align-items: center; gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--accent2);
      margin-top: 0.2rem;
    }
    .car-toggle .arrow { transition: transform 0.25s; display: inline-block; }
    .car-card.open .car-toggle .arrow { transform: rotate(90deg); }

    .car-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .car-card.open .car-detail { max-height: 600px; }
    .car-detail-inner {
      padding-top: 0.9rem;
      margin-top: 0.7rem;
      border-top: 1px solid var(--rule);
    }
    .detail-block { margin-bottom: 0.85rem; }
    .detail-block:last-child { margin-bottom: 0; }
    .detail-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .detail-pros .detail-label { color: var(--accent2); }
    .detail-cons .detail-label { color: var(--accent3); }
    .detail-audience .detail-label { color: var(--accent); }
    .detail-list { list-style: none; padding: 0; margin: 0; }
    .detail-list li {
      font-size: 0.85rem;
      color: var(--ink);
      line-height: 1.55;
      padding-left: 1.1rem;
      position: relative;
      margin-bottom: 0.2rem;
    }
    .detail-pros .detail-list li::before { content: '✓'; position: absolute; left: 0; color: var(--accent2); font-weight: 700; }
    .detail-cons .detail-list li::before { content: '✗'; position: absolute; left: 0; color: var(--accent3); font-weight: 700; }
    .detail-audience p { font-size: 0.86rem; color: var(--muted); line-height: 1.6; margin: 0; padding-left: 1.1rem; position: relative; }
    .detail-audience p::before { content: '👤'; position: absolute; left: 0; font-size: 0.8rem; }

    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 2.4rem; margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.95rem; margin-bottom: 0.4rem; }
    .empty-state .sub { font-size: 0.82rem; color: var(--muted); }

    .db-foot-note {
      margin-top: 2rem;
      background: color-mix(in srgb, var(--accent) 7%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 0.88rem;
      color: var(--ink);
      line-height: 1.65;
    }
    .db-foot-note strong { color: var(--accent); }

    /* 返回顶部 */
    .back-to-top{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.3s;z-index:90;box-shadow:var(--shadow)}
    .back-to-top.show{opacity:1;pointer-events:auto}
    .back-to-top:hover{transform:translateY(-3px)}

    .fade-up { opacity: 0; animation: fadeUp 0.5s ease-out forwards; }
  </style>
</head>

  function setTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('chaoge-theme',t)}catch(e){}document.querySelectorAll('.theme-option').forEach(o=>o.classList.toggle('active',o.dataset.theme===t))}

  document.addEventListener('click',e=>{if(!e.target.closest('.theme-switch'))document.getElementById('themeMenu')?.classList.remove('open')});
  (function(){try{const t=localStorage.getItem('chaoge-theme')||'dark';setTheme(t)}catch(e){setTheme('dark')}})();

  </script>

    function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function tagsHtml(tags){
      return tags.map(function(t){
        var cls = (t==='新能源') ? 'car-tag t-newenergy' : 'car-tag';
        return '<span class="'+cls+'">'+t+'</span>';
      }).join('');
    }

    function renderCard(car){
      var pros = car.pros.map(function(p){ return '<li>'+esc(p)+'</li>'; }).join('');
      var cons = car.cons.map(function(c){ return '<li>'+esc(c)+'</li>'; }).join('');
      var d = document.createElement('div');
      d.className = 'car-card';
      d.innerHTML =
        '<div class="car-head">'+
          '<div class="car-emoji">'+car.emoji+'</div>'+
          '<div>'+
            '<div class="car-name">'+esc(car.name)+'<span class="car-type">'+car.type+'</span></div>'+
            '<div class="car-price">'+car.price+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="car-tags">'+tagsHtml(car.tags)+'</div>'+
        '<div class="car-comment">“'+esc(car.comment)+'”</div>'+
        '<div class="car-toggle"><span class="arrow">›</span> 展开看优缺点</div>'+
        '<div class="car-detail"><div class="car-detail-inner">'+
          '<div class="detail-block detail-pros"><div class="detail-label">优点</div><ul class="detail-list">'+pros+'</ul></div>'+
          '<div class="detail-block detail-cons"><div class="detail-label">缺点</div><ul class="detail-list">'+cons+'</ul></div>'+
          '<div class="detail-block detail-audience"><div class="detail-label">适合人群</div><p>'+esc(car.audience)+'</p></div>'+
        '</div></div>';
      // 点击卡片展开/收起
      d.addEventListener('click', function(e){
        // 避免点标签内链接时误触（本卡无链接，但保险）
        d.classList.toggle('open');
      });
      return d;
    }

    function matchBudget(car){
      if(!state.budget) return true;
      var b = BUDGETS[state.budget];
      return car.min <= b[1] && car.max >= b[0];
    }
    function matchTags(car){
      if(state.tags.length === 0) return true;
      return state.tags.every(function(t){ return car.tags.indexOf(t) !== -1; });
    }

    function render(){
      grid.innerHTML = '';
      var matched = CARS.filter(function(c){ return matchBudget(c) && matchTags(c); });
      countEl.textContent = matched.length;
      if(matched.length === 0){
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="emoji">🔍</div><p>没找到同时满足这些条件的车</p><p class="sub">条件太苛刻了，去掉一两个标签试试，或者调宽预算。</p>';
        grid.appendChild(empty);
        return;
      }
      var frag = document.createDocumentFragment();
      matched.forEach(function(c){ frag.appendChild(renderCard(c)); });
      grid.appendChild(frag);
    }

    // 预算：单选切换
    document.getElementById('budgetRow').addEventListener('click', function(e){
      var btn = e.target.closest('.chip.budget');
      if(!btn) return;
      var b = btn.dataset.b;
      if(state.budget === b){
        state.budget = null;
        btn.classList.remove('active');
      } else {
        document.querySelectorAll('#budgetRow .chip.budget').forEach(function(x){ x.classList.remove('active'); });
        state.budget = b;
        btn.classList.add('active');
      }
      render();
    });

    // 标签：多选
    document.getElementById('tagRow').addEventListener('click', function(e){
      var btn = e.target.closest('.chip[data-t]');
      if(!btn) return;
      var t = btn.dataset.t;
      var i = state.tags.indexOf(t);
      if(i === -1){ state.tags.push(t); btn.classList.add('active'); }
      else { state.tags.splice(i,1); btn.classList.remove('active'); }
      render();
    });

    // 重置
    document.getElementById('resetBtn').addEventListener('click', function(){
      state.budget = null; state.tags = [];
      document.querySelectorAll('.chip.active').forEach(function(x){ x.classList.remove('active'); });
      render();
    });

    render();
  })();
