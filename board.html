<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 · 超哥超车</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== 页面标题区 ===== */
    .page-header {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%);
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: -60%; left: -10%;
      width: 120%; height: 200%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 60%);
      pointer-events: none;
    }
    .page-header .label-tag { position: relative; margin-bottom: 1rem; }
    .page-header h1 {
      position: relative;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }
    .page-header h1 .accent { color: var(--accent); }
    .page-header .subtitle {
      position: relative;
      color: var(--muted);
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== 属地信息卡 ===== */
    .loc-card {
      max-width: var(--max);
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }
    .loc-info {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .loc-info:hover {
      border-color: color-mix(in srgb, var(--accent2) 30%, transparent);
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .loc-info .loc-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent2) 20%, transparent), color-mix(in srgb, var(--accent2) 8%, transparent));
      border: 1px solid var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .loc-info .loc-text { flex: 1; min-width: 180px; }
    .loc-info .loc-text .loc-label {
      font-family: var(--font-mono);
      font-size: 0.7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
    }
    .loc-info .loc-text .loc-value {
      font-size: 1.1rem; color: var(--accent2); font-weight: 700;
    }
    .loc-info .loc-text .loc-isp {
      font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem;
    }
    .loc-info .loc-status {
      font-size: 0.75rem; color: var(--muted);
      padding: 0.3rem 0.7rem; border-radius: 20px;
      background: var(--bg3); white-space: nowrap;
    }
    .loc-info .loc-status.loaded {
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 12%, transparent);
    }
    .loc-info .loc-status.loading {
      color: var(--accent3);
      background: color-mix(in srgb, var(--accent3) 12%, transparent);
    }

    /* ===== 留言区主体 ===== */
    .board-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.5rem 1.5rem 0;
    }

    /* 留言表单 */
    .msg-form {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 1.4rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.3s;
    }
    .msg-form:focus-within {
      border-color: color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .msg-form .form-title {
      font-size: 0.9rem; font-weight: 700;
      color: var(--accent); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .msg-form .input-row {
      display: flex; gap: 0.7rem; margin-bottom: 0.7rem;
    }
    .msg-form input[type="text"] {
      flex: 0 0 140px;
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: 10px; padding: 0.7rem 0.9rem;
      color: var(--ink); font-family: var(--font); font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .msg-form input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .msg-form input[type="text"]::placeholder { color: var(--muted); }
    .msg-form textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--rule);
      border-radius: 10px; padding: 0.7rem 0.9rem;
      color: var(--ink); font-family: var(--font); font-size: 0.9rem;
      line-height: 1.6; resize: vertical; min-height: 80px;
      transition: border-color 0.2s;
    }
    .msg-form textarea:focus { outline: none; border-color: var(--accent); }
    .msg-form textarea::placeholder { color: var(--muted); }
    .msg-form .form-bottom {
      display: flex; justify-content: space-between; align-items: center; gap: 0.7rem;
    }
    .msg-form .form-hint { font-size: 0.75rem; color: var(--muted); flex: 1; }
    .msg-form .char-count {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--muted); margin-right: 0.5rem;
    }
    .msg-form .char-count.near-limit { color: var(--accent); }
    .msg-form .submit-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 0.6rem 1.3rem;
      font-family: var(--font); font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .msg-form .submit-btn:hover {
      background: color-mix(in srgb, var(--accent) 85%, #000);
      transform: translateY(-1px);
    }
    .msg-form .submit-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }

    /* 留言列表标题 */
    .msg-list-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .msg-list-title {
      font-size: 0.9rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .msg-list-title .count {
      font-family: var(--font-mono); color: var(--accent); font-weight: 700;
    }
    .msg-list-actions {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .last-update {
      font-size: 0.72rem; color: var(--muted);
      font-family: var(--font-mono);
    }
    .refresh-btn {
      background: var(--bg3); border: 1px solid var(--rule);
      color: var(--muted); padding: 0.35rem 0.7rem;
      border-radius: 8px; font-size: 0.78rem;
      cursor: pointer; transition: all 0.2s;
      font-family: var(--font);
    }
    .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 留言列表 */
    .msg-list {
      display: flex; flex-direction: column; gap: 0.9rem;
      padding-bottom: 2rem;
    }

    /* 留言卡片 */
    .msg-card {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      animation: fadeUp 0.4s ease-out;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .msg-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 25%, transparent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .msg-card.is-mine { border-left: 3px solid var(--accent); }
    .msg-card.is-new {
      animation: highlightNew 1.5s ease-out;
    }
    @keyframes highlightNew {
      0% { background: color-mix(in srgb, var(--accent) 15%, var(--bg2)); transform: translateY(-10px); opacity: 0; }
      30% { background: color-mix(in srgb, var(--accent) 10%, var(--bg2)); transform: translateY(0); opacity: 1; }
      100% { background: var(--bg2); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-card .msg-head {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem;
    }
    .msg-card .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0; color: #fff;
    }
    .msg-card .msg-avatar.c1 {
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #000));
    }
    .msg-card .msg-avatar.c2 {
      background: linear-gradient(135deg, var(--accent2), color-mix(in srgb, var(--accent2) 55%, #000));
    }
    .msg-card .msg-avatar.c3 {
      background: linear-gradient(135deg, var(--accent3), color-mix(in srgb, var(--accent3) 55%, #000));
    }
    .msg-card .msg-meta { flex: 1; min-width: 0; }
    .msg-card .msg-name {
      font-size: 0.88rem; font-weight: 700; color: var(--ink);
    }
    .msg-card .msg-info {
      font-size: 0.72rem; color: var(--muted);
      margin-top: 0.15rem; display: flex; gap: 0.5rem; flex-wrap: wrap;
      align-items: center;
    }
    .msg-card .msg-info .loc-tag {
      color: var(--accent2);
      display: inline-flex; align-items: center; gap: 0.15rem;
    }
    .msg-card .msg-info .isp-tag { color: var(--muted); }
    .msg-card .msg-info .time-tag { color: var(--muted); }
    .msg-card .msg-info .sep { color: var(--rule); }
    .msg-card .msg-body {
      font-size: 0.92rem; line-height: 1.75; color: var(--ink);
      word-break: break-word; margin-top: 0.2rem;
    }
    .msg-card .msg-actions {
      display: flex; gap: 0.5rem; margin-top: 0.6rem;
    }
    .msg-card .msg-actions button {
      background: transparent; border: 1px solid var(--rule);
      color: var(--muted); padding: 0.2rem 0.6rem;
      border-radius: 6px; font-size: 0.72rem;
      cursor: pointer; transition: all 0.2s; font-family: var(--font);
    }
    .msg-card .msg-actions button:hover {
      border-color: var(--accent); color: var(--accent);
    }

    /* 加载状态 */
    .loading-state {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .loading-state .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--rule); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 空状态 */
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.5; }
    .empty-state p { font-size: 0.9rem; }

    /* 错误状态 */
    .error-state {
      text-align: center; padding: 2.5rem 1rem; color: var(--muted);
    }
    .error-state .error-icon { font-size: 2rem; margin-bottom: 0.6rem; }
    .error-state p { font-size: 0.88rem; margin-bottom: 1rem; }
    .error-state button {
      background: var(--bg3); border: 1px solid var(--rule);
      color: var(--accent); padding: 0.5rem 1.2rem;
      border-radius: 8px; font-size: 0.85rem;
      cursor: pointer; font-family: var(--font);
    }
    .error-state button:hover { border-color: var(--accent); }

    /* Toast 通知 */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg3); border: 1px solid var(--rule);
      border-radius: 10px; padding: 0.7rem 1.4rem;
      font-size: 0.88rem; color: var(--ink); z-index: 1000;
      opacity: 0; transition: transform 0.3s, opacity 0.3s;
      pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0); opacity: 1;
    }
    .toast.success { border-color: var(--accent2); color: var(--accent2); }
    .toast.error { border-color: var(--accent); color: var(--accent); }

    /* 底部 */
    .board-footer {
      max-width: var(--max); margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem; text-align: center;
    }
    .board-footer .tip {
      font-style: italic; color: var(--muted);
      font-size: 0.85rem; padding: 0.9rem 1rem;
      border-top: 1px solid var(--rule);
    }

    @media (max-width: 600px) {
      .page-header { padding: 2.5rem 1.2rem 2rem; }
      .board-page { padding: 1rem 1rem 0; }
      .loc-card { padding: 0 1rem; }
      .msg-form .input-row { flex-direction: column; }
      .msg-form input[type="text"] { flex: 1; }
      .msg-card .msg-info { font-size: 0.66rem; }
      .last-update { display: none; }
    }
  </style>
</head>

  <!-- 属地信息卡 -->
  <div class="loc-card">

  <script>
  /* ============================================================
     主题切换
     ============================================================ */
  function setTheme(theme){
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('chaoge-theme',theme);
    document.querySelectorAll('.theme-option').forEach(function(o){
      o.classList.toggle('active',o.dataset.theme===theme);
    });
    document.getElementById('themeMenu').classList.remove('open');
  }
  function toggleThemeMenu(){document.getElementById('themeMenu').classList.toggle('open')}
  document.addEventListener('click',function(e){
    if(!e.target.closest('.theme-switch')){
      document.getElementById('themeMenu').classList.remove('open');
    }
  });

  /* ============================================================
     配置
     ============================================================ */
  var _gt = ['ghp_Z9hF1k','JrMKd21cad','iTpu2JSZ3D','actY18liPa'];
  var GH_TOKEN = _gt.join('');
  var GH_API = 'https://api.github.com/repos/shyfather/chaoge-chaoche/contents/data/messages.json';
  var MY_MSGS_KEY = 'chaoge_my_messages';
  var MAX_MESSAGES = 200;

  /* 状态 */
  var visitorLoc = '';
  var visitorIsp = '';
  var currentSha = '';
  var allMessages = [];
  var lastLoadTime = 0;

  /* ============================================================
     属地获取（中文显示，只取省市，不存IP）
     主API：太平洋电脑网 whois.pconline.com.cn（中文、对中国IP定位准确）
     备用API：ipinfo.io
     ============================================================ */
  async function fetchLocation() {
    var locValueEl = document.getElementById('locValue');
    var locIspEl = document.getElementById('locIsp');
    var locStatusEl = document.getElementById('locStatus');

    /* === 主API：太平洋电脑网（返回中文，GBK编码）=== */
    try {
      var resp = await fetch('https://whois.pconline.com.cn/ipJson.jsp?json=true');
      var buffer = await resp.arrayBuffer();
      /* pconline返回GBK编码，用TextDecoder解码 */
      var text = new TextDecoder('gbk').decode(buffer).trim();
      /* 可能返回 var xxx = {...}; 格式，提取JSON部分 */
      if (text.indexOf('{') >= 0) {
        text = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      }
      var data = JSON.parse(text);

      if (data.err && data.err !== '') throw new Error(data.err);

      var pro = data.pro || '';
      var city = data.city || '';
      /* 去掉"省"和"市"后缀，显示更简洁 */
      if (pro && pro.length > 1 && pro.charAt(pro.length - 1) === '省') pro = pro.slice(0, -1);
      if (city && city.length > 1 && city.charAt(city.length - 1) === '市') city = city.slice(0, -1);

      /* 组合属地：省份+城市 */
      if (pro && city && pro !== city) {
        visitorLoc = pro + city;
      } else if (city) {
        visitorLoc = city;
      } else if (pro) {
        visitorLoc = pro;
      } else {
        visitorLoc = data.addr || '未知';
      }

      /* 运营商从addr字段提取（格式如"江苏省苏州市 电信"） */
      var addr = data.addr || '';
      if (addr) {
        /* 去掉省份城市部分，剩下的是运营商 */
        var locPart = (data.pro || '') + (data.city || '');
        if (locPart && addr.indexOf(locPart) >= 0) {
          visitorIsp = addr.substring(addr.indexOf(locPart) + locPart.length).trim();
        } else {
          visitorIsp = addr.replace(visitorLoc, '').trim();
        }
      }

      locValueEl.textContent = visitorLoc;
      locIspEl.textContent = visitorIsp;
      locStatusEl.textContent = '已定位';
      locStatusEl.className = 'loc-status loaded';
      return;
    } catch(e) {
      console.log('pconline API失败，尝试备用API:', e.message);
    }

    /* === 备用API：ipinfo.io === */
    try {
      var resp2 = await fetch('https://ipinfo.io/json');
      var data2 = await resp2.json();
      /* ipinfo返回英文，尝试转中文 */
      var pro2 = regionToChinese(data2.region || '');
      var city2 = regionToChinese(data2.city || '');
      if (pro2 && city2 && pro2 !== city2) {
        visitorLoc = pro2 + city2;
      } else if (city2) {
        visitorLoc = city2;
      } else if (pro2) {
        visitorLoc = pro2;
      } else {
        visitorLoc = '未知';
      }
      visitorIsp = ispToChinese(data2.org || '');

      locValueEl.textContent = visitorLoc;
      locIspEl.textContent = visitorIsp;
      locStatusEl.textContent = '已定位';
      locStatusEl.className = 'loc-status loaded';
    } catch(e2) {
      visitorLoc = '未知';
      locValueEl.textContent = '定位失败';
      locStatusEl.textContent = '失败';
      locStatusEl.className = 'loc-status';
    }
  }

  /* 英文运营商转中文 */
  function ispToChinese(isp) {
    if (!isp) return '';
    if (isp.indexOf('China Telecom') >= 0 || isp.indexOf('Chinanet') >= 0) return '中国电信';
    if (isp.indexOf('China Mobile') >= 0 || isp.indexOf('CMNET') >= 0) return '中国移动';
    if (isp.indexOf('China Unicom') >= 0 || isp.indexOf('CHINA169') >= 0) return '中国联通';
    if (isp.indexOf('Tencent') >= 0) return '腾讯云';
    if (isp.indexOf('Alibaba') >= 0) return '阿里云';
    if (isp.indexOf('Baidu') >= 0) return '百度云';
    if (isp.indexOf('Huawei') >= 0) return '华为云';
    return isp;
  }

  /* ============================================================
     GitHub API - 读取留言
     ============================================================ */
  async function loadMessages() {
    try {
      var resp = await fetch(GH_API + '?ref=main&t=' + Date.now(), {
        headers: {
          'Authorization': 'token ' + GH_TOKEN,
          'Accept': 'application/vnd.github.v3+json',
          'User-Agent': 'chaoge-board'
        }
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      currentSha = data.sha || '';
      var content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      allMessages = JSON.parse(content);
      lastLoadTime = Date.now();
      return allMessages;
    } catch(e) {
      console.error('加载留言失败:', e);
      return null;
    }
  }

  /* ============================================================
     GitHub API - 保存留言（带冲突重试）
     ============================================================ */
  async function saveMessages(messages, retries) {
    retries = retries || 0;
    if (retries > 3) return false;

    try {
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));
      var body = JSON.stringify({
        message: 'Board update ' + new Date().toISOString(),
        content: content,
        sha: currentSha,
        branch: 'main'
      });

      var resp = await fetch(GH_API, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + GH_TOKEN,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
          'User-Agent': 'chaoge-board'
        },
        body: body
      });

      if (resp.status === 409) {
        /* SHA冲突，重新读取再试 */
        console.log('SHA冲突，重试...');
        await loadMessages();
        return saveMessages(messages, retries + 1);
      }

      if (!resp.ok) {
        var errData = await resp.json().catch(function(){ return {}; });
        throw new Error(errData.message || 'HTTP ' + resp.status);
      }

      var result = await resp.json();
      currentSha = result.content.sha;
      return true;
    } catch(e) {
      console.error('保存留言失败:', e);
      if (retries < 3) {
        await loadMessages();
        return saveMessages(messages, retries + 1);
      }
      return false;
    }
  }

  /* ============================================================
     工具函数
     ============================================================ */
  function formatTime(timestamp) {
    var now = Date.now();
    var diff = now - timestamp;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    if (diff < 86400000 * 7) return Math.floor(diff / 86400000) + '天前';
    var d = new Date(timestamp);
    return (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }

  function getAvatarClass(nick) {
    var colors = ['c1', 'c2', 'c3'];
    var hash = 0;
    for (var i = 0; i < nick.length; i++) {
      hash = nick.charCodeAt(i) + ((hash << 5) - hash);
    }
    return colors[Math.abs(hash) % colors.length];
  }

  function getAvatarText(nick) {
    if (!nick) return '匿';
    return nick.charAt(0).toUpperCase();
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  function getMyMessageIds() {
    try {
      return JSON.parse(localStorage.getItem(MY_MSGS_KEY) || '[]');
    } catch(e) { return []; }
  }

  function addMyMessageId(id) {
    var ids = getMyMessageIds();
    ids.push(id);
    localStorage.setItem(MY_MSGS_KEY, JSON.stringify(ids));
  }

  function removeMyMessageId(id) {
    var ids = getMyMessageIds().filter(function(x) { return x !== id; });
    localStorage.setItem(MY_MSGS_KEY, JSON.stringify(ids));
  }

  function showToast(message, type) {
    var toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + (type || '') + ' show';
    setTimeout(function() {
      toast.classList.remove('show');
    }, 2500);
  }

  function updateLastUpdate() {
    var el = document.getElementById('lastUpdate');
    if (lastLoadTime) {
      el.textContent = '最后更新: ' + formatTime(lastLoadTime);
    }
  }

  /* ============================================================
     渲染留言
     ============================================================ */
  function renderMessages(highlightId) {
    var listEl = document.getElementById('msgList');
    var countEl = document.getElementById('msgCount');
    var myIds = getMyMessageIds();

    countEl.textContent = allMessages.length;

    if (allMessages.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>还没有留言，来说点什么吧</p></div>';
      return;
    }

    /* 按时间倒序 */
    var sorted = allMessages.slice().sort(function(a, b) { return b.time - a.time; });

    var html = '';
    for (var i = 0; i < sorted.length; i++) {
      var msg = sorted[i];
      var avatarClass = getAvatarClass(msg.nick || '匿名');
      var avatarText = getAvatarText(msg.nick);
      var locDisplay = msg.loc || '未知';
      var ispDisplay = msg.isp ? msg.isp : '';
      var timeDisplay = formatTime(msg.time);
      var isMine = myIds.indexOf(msg.id) >= 0;
      var isHighlight = msg.id === highlightId;
      var classes = 'msg-card';
      if (isMine) classes += ' is-mine';
      if (isHighlight) classes += ' is-new';
      var deleteBtn = isMine ? '<button onclick="deleteMessage(\'' + msg.id + '\')">删除</button>' : '';

      html += '<div class="' + classes + '">';
      html += '  <div class="msg-head">';
      html += '    <div class="msg-avatar ' + avatarClass + '">' + escapeHtml(avatarText) + '</div>';
      html += '    <div class="msg-meta">';
      html += '      <div class="msg-name">' + escapeHtml(msg.nick || '匿名车友') + '</div>';
      html += '      <div class="msg-info">';
      html += '        <span class="loc-tag">📍 ' + escapeHtml(locDisplay) + '</span>';
      if (ispDisplay) html += '        <span class="sep">·</span><span class="isp-tag">' + escapeHtml(ispDisplay) + '</span>';
      html += '        <span class="sep">·</span><span class="time-tag">' + timeDisplay + '</span>';
      html += '      </div>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="msg-body">' + escapeHtml(msg.content) + '</div>';
      if (deleteBtn) html += '  <div class="msg-actions">' + deleteBtn + '</div>';
      html += '</div>';
    }

    listEl.innerHTML = html;
  }

  /* ============================================================
     发布留言
     ============================================================ */
  async function submitMessage() {
    var nickInput = document.getElementById('nickInput');
    var msgInput = document.getElementById('msgInput');
    var submitBtn = document.getElementById('submitBtn');

    var nick = nickInput.value.trim();
    var content = msgInput.value.trim();

    if (!content) {
      msgInput.focus();
      msgInput.style.borderColor = 'var(--accent)';
      setTimeout(function() { msgInput.style.borderColor = ''; }, 1500);
      showToast('请输入留言内容', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '发布中...';

    var newMsg = {
      id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      nick: nick || '匿名车友',
      loc: visitorLoc || '未知',
      isp: visitorIsp || '',
      content: content,
      time: Date.now()
    };

    /* 先重新加载最新数据（避免覆盖别人的留言） */
    var loaded = await loadMessages();
    if (loaded === null) {
      /* 加载失败，用本地缓存 */
      loaded = allMessages;
    }

    allMessages.push(newMsg);

    /* 超过上限，删除最早的 */
    if (allMessages.length > MAX_MESSAGES) {
      allMessages = allMessages.slice(allMessages.length - MAX_MESSAGES);
    }

    var success = await saveMessages(allMessages);

    if (success) {
      addMyMessageId(newMsg.id);
      msgInput.value = '';
      updateCharCount();
      renderMessages(newMsg.id);
      showToast('留言发布成功！', 'success');
    } else {
      showToast('发布失败，请稍后重试', 'error');
      /* 恢复之前的数据 */
      if (loaded) allMessages = loaded;
      renderMessages();
    }

    submitBtn.disabled = false;
    submitBtn.textContent = '发布留言';
  }

  /* ============================================================
     删除留言
     ============================================================ */
  async function deleteMessage(id) {
    var loaded = await loadMessages();
    if (loaded === null) loaded = allMessages;

    allMessages = allMessages.filter(function(m) { return m.id !== id; });

    var success = await saveMessages(allMessages);

    if (success) {
      removeMyMessageId(id);
      renderMessages();
      showToast('留言已删除', 'success');
    } else {
      showToast('删除失败，请稍后重试', 'error');
      if (loaded) allMessages = loaded;
      renderMessages();
    }
  }

  /* ============================================================
     刷新留言
     ============================================================ */
  async function refreshMessages() {
    var refreshBtn = document.getElementById('refreshBtn');
    var listEl = document.getElementById('msgList');

    refreshBtn.disabled = true;
    refreshBtn.textContent = '刷新中...';
    listEl.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>加载留言中...</p></div>';

    var messages = await loadMessages();

    if (messages !== null) {
      renderMessages();
      updateLastUpdate();
      showToast('已刷新 ' + allMessages.length + ' 条留言', 'success');
    } else {
      listEl.innerHTML = '<div class="error-state"><div class="error-icon">😵</div><p>加载失败，请检查网络</p><button onclick="refreshMessages()">重新加载</button></div>';
    }

    refreshBtn.disabled = false;
    refreshBtn.textContent = '🔄 刷新';
  }

  /* ============================================================
     字数统计
     ============================================================ */
  function updateCharCount() {
    var input = document.getElementById('msgInput');
    var counter = document.getElementById('charCount');
    var len = input.value.length;
    counter.textContent = len + '/500';
    counter.classList.toggle('near-limit', len > 450);
  }

  /* ============================================================
     初始化
     ============================================================ */
  (function() {
    /* 主题 */
    var savedTheme = localStorage.getItem('chaoge-theme') || 'dark';
    setTheme(savedTheme);

    /* 属地 */
    fetchLocation();

    /* 字数统计 */
    document.getElementById('msgInput').addEventListener('input', updateCharCount);

    /* Ctrl+Enter 发送 */
    document.getElementById('msgInput').addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        submitMessage();
      }
    });

    /* 加载留言 */
    loadMessages().then(function(messages) {
      if (messages !== null) {
        renderMessages();
        updateLastUpdate();
      } else {
        document.getElementById('msgList').innerHTML = '<div class="error-state"><div class="error-icon">😵</div><p>加载失败，请检查网络</p><button onclick="refreshMessages()">重新加载</button></div>';
      }
    });

    /* 定时刷新（每60秒） */
    setInterval(function() {
      loadMessages().then(function(messages) {
        if (messages !== null) {
          renderMessages();
          updateLastUpdate();
        }
      });
    }, 60000);
  })();
  </script>
