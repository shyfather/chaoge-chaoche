<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 · 超哥超车</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%);
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -10%;
      width: 120%;
      height: 200%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 60%);
      pointer-events: none;
    }
    .page-header .label-tag { position: relative; margin-bottom: 1rem; }
    .page-header h1 {
      position: relative;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }
    .page-header h1 .accent { color: var(--accent); }
    .page-header .subtitle {
      position: relative;
      color: var(--muted);
      font-size: 1rem;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== IP信息卡 ===== */
    .ip-card {
      max-width: var(--max);
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }
    .ip-info {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .ip-info .ip-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent2) 15%, transparent);
      border: 1px solid var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .ip-info .ip-text {
      flex: 1;
      min-width: 200px;
    }
    .ip-info .ip-text .ip-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
    }
    .ip-info .ip-text .ip-value {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      color: var(--accent2);
      font-weight: 700;
    }
    .ip-info .ip-text .ip-loc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .ip-info .ip-status {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      background: var(--bg3);
      white-space: nowrap;
    }
    .ip-info .ip-status.loaded {
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 12%, transparent);
    }
    .ip-info .ip-status.loading {
      color: var(--accent3);
      background: color-mix(in srgb, var(--accent3) 12%, transparent);
    }

    /* ===== Giscus评论区 ===== */
    .giscus-wrap {
      max-width: var(--max);
      margin: 1.5rem auto 0;
      padding: 0 1.5rem 3rem;
    }
    .giscus-hint {
      background: var(--bg2);
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.2rem;
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .giscus-hint .hint-icon { flex-shrink: 0; }
    .giscus-hint a { color: var(--accent2); text-decoration: underline; }

    .giscus {
      min-height: 300px;
    }
    .giscus-loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .giscus-loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 底部 */
    .board-footer {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
      text-align: center;
    }
    .board-footer .tip {
      font-style: italic;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0.9rem 1rem;
      border-top: 1px solid var(--rule);
    }

    @media (max-width: 600px) {
      .page-header { padding: 2.5rem 1.2rem 2rem; }
      .giscus-wrap { padding: 0 1rem 3rem; }
      .ip-card { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">超哥<span class="accent">超车</span></a>
      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="models.html">模型</a>
          <a href="calculator.html">算账器</a>
          <a href="quotes.html">金句</a>
          <a href="cases.html">案例</a>
          <a href="checklist.html">清单</a>
          <a href="compare.html">对比</a>
          <a href="pitfalls.html">避坑</a>
          <a href="recommend.html">推荐</a>
          <a href="chat.html">在线</a>
          <a href="board.html" class="active">留言</a>
          <a href="about.html">画像</a>
        </div>
        <div class="theme-switch">
          <button class="theme-btn" onclick="toggleThemeMenu()" title="切换主题">🎨</button>
          <div class="theme-menu" id="themeMenu">
            <button class="theme-option" data-theme="dark" onclick="setTheme('dark')"><span class="theme-swatch" style="background:#0f1115;border-color:#ff6b35"></span>暗夜橙</button>
            <button class="theme-option" data-theme="light" onclick="setTheme('light')"><span class="theme-swatch" style="background:#f8f9fa;border-color:#ff6b35"></span>极简白</button>
            <button class="theme-option" data-theme="forest" onclick="setTheme('forest')"><span class="theme-swatch" style="background:#0a1f1c;border-color:#52d4a8"></span>墨绿森林</button>
            <button class="theme-option" data-theme="cyber" onclick="setTheme('cyber')"><span class="theme-swatch" style="background:#0d0b1a;border-color:#c026d3"></span>暗紫赛博</button>
            <button class="theme-option" data-theme="paper" onclick="setTheme('paper')"><span class="theme-swatch" style="background:#1a1612;border-color:#e8a87c"></span>暖纸棕</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 页面标题区 -->
  <header class="page-header">
    <span class="label-tag">车友交流</span>
    <h1>车友<span class="accent">留言板</span></h1>
    <p class="subtitle">说说你的买车故事、用车感受，或者问超哥一个问题。所有人都能看到你的留言。</p>
  </header>

  <!-- IP信息卡 -->
  <div class="ip-card">
    <div class="ip-info">
      <div class="ip-icon">🌐</div>
      <div class="ip-text">
        <div class="ip-label">你的IP地址</div>
        <div class="ip-value" id="ipValue">获取中...</div>
        <div class="ip-loc" id="ipLoc">正在定位...</div>
      </div>
      <div class="ip-status loading" id="ipStatus">定位中</div>
    </div>
  </div>

  <!-- Giscus 评论区 -->
  <main class="giscus-wrap">
    <div class="giscus-hint">
      <span class="hint-icon">💬</span>
      <span>留言基于 GitHub Discussions，需要 <a href="https://github.com/login" target="_blank">登录 GitHub</a> 账号后才能评论。所有留言公开可见，支持点赞和回复。</span>
    </div>
    <div class="giscus" id="giscusContainer">
      <div class="giscus-loading">
        <div class="spinner"></div>
        <p>评论区加载中...</p>
      </div>
    </div>
  </main>

  <!-- 底部 -->
  <footer class="board-footer">
    <p class="tip">留言通过 GitHub Discussions 存储，所有人可见。买车是为生活服务，不是拖累生活。</p>
  </footer>

  <script>
  /* ============================================================
     主题切换 + Giscus主题同步
     ============================================================ */
  function getGiscusTheme(theme) {
    // 映射站点主题到Giscus主题
    if (theme === 'light') return 'light';
    if (theme === 'forest' || theme === 'paper') return 'dark_dimmed';
    return 'dark'; // dark, cyber
  }

  function updateGiscusTheme(theme) {
    var iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage({
      giscus: { setConfig: { theme: getGiscusTheme(theme) } }
    }, 'https://giscus.app');
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('chaoge-theme', theme);
    document.querySelectorAll('.theme-option').forEach(function(o) {
      o.classList.toggle('active', o.dataset.theme === theme);
    });
    document.getElementById('themeMenu').classList.remove('open');
    updateGiscusTheme(theme);
  }

  function toggleThemeMenu() {
    document.getElementById('themeMenu').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.theme-switch')) {
      document.getElementById('themeMenu').classList.remove('open');
    }
  });

  /* ============================================================
     IP获取
     ============================================================ */
  async function fetchIP() {
    var ipValueEl = document.getElementById('ipValue');
    var ipLocEl = document.getElementById('ipLoc');
    var ipStatusEl = document.getElementById('ipStatus');

    try {
      var resp = await fetch('https://ipapi.co/json/');
      if (!resp.ok) throw new Error('API 1 failed');
      var data = await resp.json();
      if (data.error) throw new Error(data.reason || 'API error');

      var ip = data.ip || '未知';
      var loc = [data.country_name, data.region, data.city].filter(function(f) { return f; }).join(' ');
      var isp = data.org || '';

      ipValueEl.textContent = ip;
      ipLocEl.textContent = '\u{1F4CD} ' + loc + (isp ? ' \u00B7 ' + isp : '');
      ipStatusEl.textContent = '已定位';
      ipStatusEl.className = 'ip-status loaded';
    } catch(e) {
      try {
        var resp2 = await fetch('https://ipinfo.io/json');
        var data2 = await resp2.json();
        var ip2 = data2.ip || '未知';
        var loc2 = [data2.country, data2.region, data2.city].filter(function(f) { return f; }).join(' ');
        var isp2 = data2.org || '';

        ipValueEl.textContent = ip2;
        ipLocEl.textContent = '\u{1F4CD} ' + loc2 + (isp2 ? ' \u00B7 ' + isp2 : '');
        ipStatusEl.textContent = '已定位';
        ipStatusEl.className = 'ip-status loaded';
      } catch(e2) {
        ipValueEl.textContent = '获取失败';
        ipLocEl.textContent = '无法获取IP信息';
        ipStatusEl.textContent = '失败';
        ipStatusEl.className = 'ip-status';
      }
    }
  }

  /* ============================================================
     初始化
     ============================================================ */
  (function() {
    var savedTheme = localStorage.getItem('chaoge-theme') || 'dark';
    setTheme(savedTheme);
    fetchIP();

    // 动态加载 Giscus
    var giscusScript = document.createElement('script');
    giscusScript.src = 'https://giscus.app/client.js';
    giscusScript.setAttribute('data-repo', 'shyfather/chaoge-chaoche');
    giscusScript.setAttribute('data-repo-id', 'R_kgDOTUXNRQ');
    giscusScript.setAttribute('data-category', 'Announcements');
    giscusScript.setAttribute('data-category-id', 'DIC_kwDOTUXNRc4DBQXy');
    giscusScript.setAttribute('data-mapping', 'pathname');
    giscusScript.setAttribute('data-strict', '0');
    giscusScript.setAttribute('data-reactions-enabled', '1');
    giscusScript.setAttribute('data-emit-metadata', '0');
    giscusScript.setAttribute('data-input-position', 'top');
    giscusScript.setAttribute('data-theme', getGiscusTheme(savedTheme));
    giscusScript.setAttribute('data-lang', 'zh-CN');
    giscusScript.setAttribute('crossorigin', 'anonymous');
    giscusScript.async = true;

    // Giscus加载完成后清除loading提示
    giscusScript.onload = function() {
      var loading = document.querySelector('.giscus-loading');
      if (loading) loading.style.display = 'none';
    };

    document.getElementById('giscusContainer').appendChild(giscusScript);
  })();
  </script>
</body>
</html>
