    if (timingMatch) {
      info.isTiming = true;
      info.timingWord = timingMatch[0];
    }

    // 对比检测
    info.isCompare = /还是|对比|VS|vs|Vs|比较|选哪个|哪个好|怎么选|纠结|抉择/.test(text) && info.cars.length >= 2;

    return info;
  }

  // ---------- 算账工具 ----------
  function calcMonthly(budgetWan, isLoan) {
    // 落地价估算（购置税约车价8.8%，保险+上牌约5000）
    const carPrice = budgetWan * 10000;
    const purchaseTax = carPrice * 0.088;
    const insuranceUp = 5000;
    const onRoad = Math.round((carPrice + purchaseTax + insuranceUp) / 10000 * 10) / 10;

    // 贷款：70%本金，3年，年利率约5%
    let monthlyPayment = 0;
    if (isLoan) {
      const principal = carPrice * 0.7;
      const months = 36;
      const monthlyRate = 0.05 / 12;
      monthlyPayment = Math.round(principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1));
    }

    // 养车月均
    const insuranceMonthly = Math.round((carPrice * 0.025 + 4000) / 12); // 商业险+交强
    const gasMonthly = 700; // 油费（按月1000km，8L/100km，8元/L）
    const maintenanceMonthly = Math.round(carPrice * 0.015 / 12); // 保养
    const totalOwnMonthly = insuranceMonthly + gasMonthly + maintenanceMonthly;

    return {
      onRoad,
      monthlyPayment,
      insuranceMonthly,
      gasMonthly,
      maintenanceMonthly,
      totalMonthly: monthlyPayment + totalOwnMonthly,
      totalOwnMonthly
    };
  }

  // ---------- 回复生成器 ----------
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // 1. 劝退优先论
  function genDissuade(info) {
    const calc = calcMonthly(info.budget, info.isLoan);
    const carName = info.cars[0] || '这车';
    const ratio = Math.round(calc.totalMonthly / info.salary * 100);
    const affordable = info.salary * 0.5;

    let r = `兄弟，先别想${carName}了。${pick(CATCHPHRASES)}，先听我算笔账。<br><br>`;
    r += `${info.budget}万的车，落地得${calc.onRoad}万。`;
    if (info.isLoan) {
      r += `贷款70%分3年，月供${calc.monthlyPayment}。`;
    }
    r += `加上保险${calc.insuranceMonthly}、油费${calc.gasMonthly}、保养${calc.maintenanceMonthly}，每月养车得${calc.totalMonthly}。<br><br>`;
    r += `你月薪${info.salary}，光养车就花掉${ratio}%，超出你月收入的一半。剩下那点钱，吃住怎么办？谈什么生活质量？`;
    if (info.isMoneyTight) r += `你都说有压力了，还往坑里跳？`;
    r += `<br><br>不是不让你买车，是这个阶段不该买这个价位。先存钱，买辆10万以内的代步车，能力范围内越便宜越好。${pick(GOLDEN_QUOTES)}`;
    return r;
  }

  // 2. 面子vs务实论
  function genFaceVsPractical(info) {
    const annualIncome = info.salary * 12;
    const yearRatio = (info.budget * 10000 / annualIncome).toFixed(1);
    const calc = calcMonthly(info.budget, true);
    const carName = info.cars[0] || '这车';

    let r = `兄弟，我得泼你盆冷水。${carName}落地${calc.onRoad}万，是你年薪的${yearRatio}倍，还要贷款买，这账算不对。<br><br>`;
    r += `说好听的是大件消费品，难听的就是赔钱货。贷款买超出能力的车撑面子，是最差的消费决策。月供${calc.monthlyPayment}加上养车${calc.totalOwnMonthly}，一年光车就吃掉你${calc.totalMonthly * 12}，再加上折旧，三年下来你净亏十几万。<br><br>`;
    r += `面子是给别人看的，日子是自己过的。先顾好生活，再谈享受；先稳好经济，再考虑消费。等你年薪翻倍再回来考虑这车不迟。${pick(GOLDEN_QUOTES)}`;
    return r;
  }

  // 3. 需求锚点论 - 两车对比
  function genCompare(info) {
    const [c1, c2] = info.cars;
    const d1 = CAR_DB[c1], d2 = CAR_DB[c2];

    if (d1 && d2) {
      let isLuxury1 = /奥迪|奔驰|宝马|BBA/.test(d1.brand);
      let isLuxury2 = /奥迪|奔驰|宝马|BBA/.test(d2.brand);

      let r = `两款车落地价差不多，${c1}约${d1.price}万，${c2}约${d2.price}万。但选的不是车，是你的需求。<br><br>`;
      r += `${c1}核心优势——${d1.traits}。短板是${d1.weak}。<br>`;
      r += `${c2}核心优势——${d2.traits}。短板是${d2.weak}。<br><br>`;

      // 短板可补论
      r += `你纠结的车机老旧、音响一般？那都不是事。车机用手机支架，音响加装DSP功放，花不了几个钱。这种可补的短板，不作为否决理由。致命缺陷才直接pass。<br><br>`;

      if (isLuxury1 !== isLuxury2) {
        const lux = isLuxury1 ? c1 : c2;
        const luxData = isLuxury1 ? d1 : d2;
        const prag = isLuxury1 ? c2 : c1;
        r += `真正的问题是：你对那个豪华品牌logo的向往有多强？如果拥有${luxData.brand}品牌是你长久的心愿，且在能力范围内，${lux}的缺点都能克服。如果品牌不是刚需，${prag}性价比明显更高。<br><br>`;
      } else {
        r += `真正的问题是：你最看重什么？是空间、动力、还是省心？把你的核心需求拎出来，哪款更匹配就选哪款。<br><br>`;
      }
      r += `没有标准答案，这是理性和感性的拉锯。你自己回答。`;
      return r;
    }

    // 通用对比（车型不在库）
    let r = `兄弟，对比两台车，参数表是最不重要的东西。<br><br>`;
    r += `先问自己三个问题：一，你买车最核心的需求是什么？代步、家用、还是面子？二，两台车的落地价差多少？三，哪台的优点正好踩在你的核心需求上？<br><br>`;
    r += `价格重合时，选择由"你对品牌logo的向往程度"决定，不是由参数表决定。致命缺陷（烧机油、变速箱顿挫）直接pass，可补短板（车机、音响）别纠结。把需求说清楚，我帮你算。`;
    return r;
  }

  // 4. 时机判断论
  function genTiming(info) {
    const isSpring = /春节/.test(info.timingWord);
    let r = '';
    if (isSpring) {
      r += `春节前买车？劝你买个der，先别急着掏钱。<br><br>`;
      r += `春节前是传统旺季，优惠收缩、甚至涨价。销售知道你急着开回家过年，议价权全在他手里。你以为捡便宜，实际是高位接盘。<br><br>`;
    } else {
      r += `兄弟，买车的时机比买什么车更重要。急于掏钱要吃亏。<br><br>`;
    }
    r += `现在三个信号同时出现：油车新款优惠收缩涨价、新能源新技术（800V、6C快充）即将普及、补贴政策有望加码。这时候冲进去，就是给人接盘。<br><br>`;
    if (info.isOil) {
      r += `油车现在买，新款优惠在收，价格不划算；再等等，新能源技术成熟了，油车保值率还得往下掉。`;
    } else if (info.isElectric) {
      r += `电车技术迭代太快，今年买的明年就成旧款。等800V和6C快充铺开，续航焦虑基本解决，你现在的车就尴尬了。`;
    } else {
      r += `等比买划算。有新款、有新技术、有补贴趋势时，等一等就是省钱。`;
    }
    r += `<br><br>如果你确实急用，考虑二手车或租车过渡，比高位买新车划算。${pick(GOLDEN_QUOTES)}`;
    return r;
  }

  // 5. 经济账本思维 - 油电
  function genOilVsElectric(info) {
    let r = `油车还是电车？别听销售忽悠，算总账。<br><br>`;
    r += `电车省油费不假，每公里省五六毛。但你算过这些没：电池贬值快，三年保值率比油车低15%-20%；保险比同价位油车贵20%-30%；换电池一组大几万，出了质保就是定时炸弹；技术迭代快，今年买的明年就过时。<br><br>`;

    if (info.isFirstCar) {
      r += `你是第一台车，我建议偏向油车。普通家庭第一台车，要的是省心、保值、养车便宜。油车十年开不坏，保值率稳，加油五分钟走人。电车那些省下的油费，折旧里全赔回去了。<br><br>`;
      r += `等你有了第二台车，再考虑电车做城市代步补充，那才是电车的正确打开方式。`;
    } else if (info.isCommute) {
      r += `你纯市区代步、有家充桩，电车确实划算。但你要是没固定充电位、经常跑长途，油车省心得多。先把用车场景说清楚。`;
    } else {
      r += `第一台车偏油车，第二台代步再考虑电车。你具体什么情况？日常多少公里？有没有家充条件？说清楚我帮你算。`;
    }
    r += `<br><br>${pick(GOLDEN_QUOTES)}`;
    return r;
  }

  // 6. 需求锚点论 - 预算选车
  function genBudgetPick(info) {
    const b = info.budget;
    let r = '';
    let recommend = '';

    if (b && b <= 10) {
      r += `${b}万以内，要省心的话方向是清楚的，但具体买哪台还得看你的需求。<br><br>`;
      r += `先回答我几个问题：这是你第一台车吗？家用还是纯代步？在意保值还是图个便宜好开？有没有特别在意的品牌？<br><br>`;
      r += `方向上，这个价位省心优先看这几类：合资入门轿车（轩逸、朗逸、卡罗拉）省油保值故障率低；想大点空间看缤智、XR-V这类小型SUV；不介意国产，秦PLUS插混省油还能上绿牌。致命缺陷（三缸机抖、双离合顿挫）直接pass。<br><br>`;
      r += `把需求说清楚，我帮你缩小范围。记住，能力范围内越便宜越好，别为了面子多花两万买不实用的。`;
    } else if (b && b <= 15) {
      r += `${b}万预算，主流家用车的甜区。但选什么得先锚定需求。<br><br>`;
      r += `家用代步，速腾、思域、卡罗拉双擎都省心；要空间看CR-V、RAV4入门款；新能源可以看宋PLUS插混。关键看你最看重什么——省油？空间？还是保值？<br><br>`;
      r += `先告诉我：第一台车还是换车？几个人坐？一年开多少公里？有没有充电条件？需求清楚了我帮你定。`;
    } else if (b && b <= 25) {
      r += `${b}万预算，选择很多，但越容易选错。先把需求说清楚。<br><br>`;
      r += `这个价位，BBA入门（Q3、X1、A4）和主流合资中高配（凯美瑞、汉兰达、冠道）价格重合。选哪个，取决于你对豪华品牌logo的向往有多强，而不是参数表。<br><br>`;
      r += `你是家用还是商务？第一台车吗？月薪多少？贷款还是全款？这些决定了你该往豪华靠还是往务实走。说清楚我帮你算。`;
    } else if (b && b > 25) {
      r += `${b}万往上，已经不是单纯选车的问题，是消费能力的问题。<br><br>`;
      r += `先确认：你的月薪能覆盖养车吗？这个价位的车，每年折旧+保险+保养轻松小十万。贷款的话月供更吓人。<br><br>`;
      r += `你月薪多少？贷款还是全款？买这车是为了面子还是真有需求？先把账算明白，再谈选哪台。车是赔钱货，别让它拖垮你的生活。`;
    } else {
      r += `兄弟，你想买什么车？先说几个关键信息我才能帮你：<br><br>`;
      r += `一，预算多少？二，月薪多少，贷款还是全款？三，这是第几台车，家用还是代步？四，有没有特别在意的品牌或车型？<br><br>`;
      r += `需求锚点定不住，推荐就是瞎扯。说清楚，我帮你算总账。`;
    }
    return r;
  }

  // 7. 默认回复
  function genDefault(info) {
    let r = `兄弟，你这话信息太少，我没法给你实在建议。<br><br>`;
    r += `买车这事，先把几点说清楚：<br>`;
    r += `▸ 预算多少（落地价）<br>`;
    r += `▸ 月薪多少，贷款还是全款<br>`;
    r += `▸ 这是第几台车，家用还是代步<br>`;
    r += `▸ 有没有看中的车型或品牌<br><br>`;
    r += `超哥不忽悠，不套路，只算账。你把需求说清楚，我帮你算明白这笔账。买车是赔钱货，咱得把钱花在刀刃上。`;
    return r;
  }

  // ---------- 主分析函数 ----------
  function analyzeAndRespond(userInput) {
    const info = extractInfo(userInput);

    // 优先级 1：月薪撑不起月供 → 劝退优先论
    if (info.salary && info.budget) {
      const calc = calcMonthly(info.budget, info.isLoan);
      const halfSalary = info.salary * 0.5;
      // 月供+养车超过月薪50%，或纯养车就超过月薪
      if (calc.totalMonthly > halfSalary || calc.totalOwnMonthly > info.salary) {
        return genDissuade(info);
      }
    }
    // 没明说月薪，但贷款+高预算（预算超过一定额度且贷款）也提示
    if (info.isLoan && info.budget && info.salary) {
      const annualIncome = info.salary * 12;
      if (info.budget * 10000 > annualIncome * 2) {
        return genFaceVsPractical(info);
      }
    }

    // 优先级 2：两车对比 → 需求锚点论
    if (info.isCompare && info.cars.length >= 2) {
      return genCompare(info);
    }
    // 即使没明确"还是"，但提到两个以上车型也走对比
    if (info.cars.length >= 2 && /选|比|还是|纠结|哪个/.test(userInput)) {
      info.isCompare = true;
      return genCompare(info);
    }

    // 优先级 3：时机 → 时机判断论
    if (info.isTiming) {
      return genTiming(info);
    }

    // 优先级 4：油车vs电车 → 经济账本思维
    if ((info.isElectric && info.isOil) || (info.isElectric && /还是|vs|对比|还是买|选/.test(userInput)) || (info.isOil && /还是|vs|电车|电动/.test(userInput))) {
      return genOilVsElectric(info);
    }
    if (info.isElectric && info.isFirstCar) {
      return genOilVsElectric(info);
    }

    // 优先级 5：具体预算选车 → 需求锚点论
    if (info.budget && info.cars.length < 2 && !info.isCompare) {
      return genBudgetPick(info);
    }

    // 优先级 6：只提到单一车型 + 贷款压力 → 劝退
    if (info.cars.length === 1 && info.isLoan && info.salary) {
      const singleCar = info.cars[0];
      const carData = CAR_DB[singleCar];
      if (carData) {
        info.budget = carData.price;
        const calc = calcMonthly(info.budget, true);
        if (calc.totalMonthly > info.salary * 0.5) {
          return genDissuade(info);
        }
      }
    }

    // 默认
    return genDefault(info);
  }

  // ---------- UI 交互 ----------
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  const WELCOME_MSG = '兄弟们好，我是超哥。说吧，你想买什么车？预算多少？月薪多少？有没有房贷？先把这几点说清楚，我帮你算算账。';

  function appendMessage(text, sender) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + sender;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + sender;
    avatar.textContent = sender === 'chaoge' ? '🎙️' : '你';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + sender;
    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = sender === 'chaoge' ? '超哥' : '你';
    const content = document.createElement('div');
    content.innerHTML = text;
    bubble.appendChild(speaker);
    bubble.appendChild(content);

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row chaoge';
    row.id = 'typingRow';
    const avatar = document.createElement('div');
    avatar.className = 'avatar chaoge';
    avatar.textContent = '🎙️';
    const bubble = document.createElement('div');
    bubble.className = 'bubble chaoge';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(typing);
    row.appendChild(avatar);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  let isResponding = false;
  function handleSend(text) {
    if (isResponding) return;
    const value = (text !== undefined ? text : userInput.value).trim();
    if (!value) return;

    appendMessage(value, 'user');
    userInput.value = '';
    autoResize();
    isResponding = true;
    sendBtn.disabled = true;

    appendTyping();
    const delay = 600 + Math.random() * 700;
    setTimeout(() => {
      try {
        removeTyping();
        let reply;
        try {
          reply = analyzeAndRespond(value);
        } catch (e) {
          console.error('对话引擎异常:', e);
          reply = '兄弟，刚才算账的时候脑子短路了一下。你把需求再说一遍——预算多少？月薪多少？贷款还是全款？我重新帮你算。';
        }
        appendMessage(reply, 'chaoge');
      } catch (e) {
        console.error('UI渲染异常:', e);
      } finally {
        isResponding = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }, delay);
  }

  // 文本框自适应高度
  function autoResize() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  }

  userInput.addEventListener('input', autoResize);
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // 快捷按钮
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      handleSend(this.dataset.q);
    });
  });

  // 初始化欢迎消息
  appendMessage(WELCOME_MSG, 'chaoge');
  </script>
