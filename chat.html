  // ---------- 对话历史 ----------
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT + CAR_CONTEXT }
  ];

  // ---------- UI 交互 ----------
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  const WELCOME_MSG = '兄弟们好，我是超哥。说吧，你想买什么车？预算多少？月薪多少？有没有房贷？先把这几点说清楚，我帮你算算账。';

  function appendMessage(text, sender) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + sender;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + sender;
    avatar.textContent = sender === 'chaoge' ? '🎙️' : '你';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + sender;
    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = sender === 'chaoge' ? '超哥' : '你';
    const content = document.createElement('div');
    content.className = 'content';
    content.innerHTML = text;
    bubble.appendChild(speaker);
    bubble.appendChild(content);

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row chaoge';
    row.id = 'typingRow';
    const avatar = document.createElement('div');
    avatar.className = 'avatar chaoge';
    avatar.textContent = '🎙️';
    const bubble = document.createElement('div');
    bubble.className = 'bubble chaoge';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    bubble.appendChild(typing);
    const hint = document.createElement('div');
    hint.className = 'thinking-hint';
    hint.textContent = '超哥正在想怎么劝你…';
    bubble.appendChild(hint);
    row.appendChild(avatar);
    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // 简单的markdown格式转换
  function formatMarkdown(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>')
      .replace(/$/, '</p>');
  }

  let isResponding = false;

  async function handleSend(text) {
    if (isResponding) return;
    const value = (text !== undefined ? text : userInput.value).trim();
    if (!value) return;

    appendMessage(value, 'user');
    userInput.value = '';
    autoResize();
    isResponding = true;
    sendBtn.disabled = true;

    appendTyping();

    // 添加用户消息到历史
    messages.push({ role: 'user', content: value });

    // 联网搜索最新行情
    let searchContext = '';
    if (needsSearch(value)) {
      // 更新提示
      const hintEl = document.querySelector('#typingRow .thinking-hint');
      if (hintEl) hintEl.textContent = '超哥正在搜索最新行情…';

      const searchResult = await searchLatestInfo(value);
      if (searchResult) {
        searchContext = `\n\n【联网搜索结果 - 最新市场行情】\n${searchResult}\n【搜索结果结束】\n请基于以上搜索结果中的最新价格和优惠信息来回答用户，如果搜索结果中有具体价格请引用。如果搜索结果与你的知识不一致，以搜索结果为准。`;
      }
    }

    try {
      // 构建带搜索上下文的消息
      const messagesToSend = [...messages];
      if (searchContext) {
        // 将搜索结果附加到最后一条用户消息
        const lastMsg = messagesToSend[messagesToSend.length - 1];
        messagesToSend[messagesToSend.length - 1] = {
          role: 'user',
          content: lastMsg.content + searchContext
        };
      }

      const response = await fetch(DEEPSEEK_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: messagesToSend,
          stream: true,
          max_tokens: 1200,
          temperature: 0.8
        })
      });

      if (!response.ok) {
        throw new Error(`API错误: ${response.status}`);
      }

      removeTyping();

      // 创建流式回复气泡
      const row = document.createElement('div');
      row.className = 'msg-row chaoge';
      const avatar = document.createElement('div');
      avatar.className = 'avatar chaoge';
      avatar.textContent = '🎙️';
      const bubble = document.createElement('div');
      bubble.className = 'bubble chaoge';
      const speaker = document.createElement('div');
      speaker.className = 'speaker';
      speaker.textContent = '超哥';
      const content = document.createElement('div');
      content.className = 'content';
      content.innerHTML = '<p></p>';
      bubble.appendChild(speaker);
      bubble.appendChild(content);
      row.appendChild(avatar);
      row.appendChild(bubble);
      chatMessages.appendChild(row);
      scrollToBottom();

      // 流式读取
      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let fullText = '';
      let buffer = '';

      while (true) {
        const { done, value: chunk } = await reader.read();
        if (done) break;

        buffer += decoder.decode(chunk, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data: ')) continue;
          const data = trimmed.slice(6);
          if (data === '[DONE]') continue;

          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if (delta) {
              fullText += delta;
              content.innerHTML = formatMarkdown(fullText);
              scrollToBottom();
            }
          } catch (e) {
            // 忽略解析错误
          }
        }
      }

      // 添加助手回复到历史
      if (fullText) {
        messages.push({ role: 'assistant', content: fullText });
      } else {
        content.innerHTML = '<p>兄弟，刚才走神了。你再说一遍？</p>';
        messages.push({ role: 'assistant', content: '兄弟，刚才走神了。你再说一遍？' });
      }

    } catch (error) {
      console.error('对话异常:', error);
      removeTyping();
      appendMessage('兄弟，网络有点问题，信号不好。你等一下再发一遍，我重新帮你算。', 'chaoge');
      // 移除最后一条用户消息，避免历史混乱
      messages.pop();
    } finally {
      isResponding = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  // 文本框自适应高度
  function autoResize() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  }

  userInput.addEventListener('input', autoResize);
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // 快捷按钮
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      handleSend(this.dataset.q);
    });
  });

  // 初始化欢迎消息
  appendMessage(WELCOME_MSG, 'chaoge');
  </script>

<script>
// 主题切换
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('chaoge-theme', theme);
  document.querySelectorAll('.theme-option').forEach(o => {
    o.classList.toggle('active', o.dataset.theme === theme);
  });
  document.getElementById('themeMenu').classList.remove('open');
}
function toggleThemeMenu() {
  document.getElementById('themeMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.theme-switch')) {
    document.getElementById('themeMenu')?.classList.remove('open');
  }
});
(function() {
  var saved = localStorage.getItem('chaoge-theme') || 'dark';
  setTheme(saved);
})();
</script>
